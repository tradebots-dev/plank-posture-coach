<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Plank Progress Dashboard</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1b1e26;
    --accent: #3a73e0;
    --good: #5fd98a;
    --bad: #ff7a7a;
    --text: #eee;
    --muted: #9aa0ab;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    padding: 24px;
  }
  h1 { font-size: 24px; margin: 0 0 4px; }
  #subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  #backLink { color: var(--accent); font-size: 13px; text-decoration: none; }
  #cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin: 20px 0 32px;
  }
  .card {
    background: var(--card);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .card .value { font-size: 26px; font-weight: 700; }
  .card .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .charts {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 1100px;
  }
  .chart-card {
    background: var(--card);
    border-radius: 10px;
    padding: 20px;
  }
  .chart-card h2 { font-size: 15px; margin: 0 0 12px; color: var(--muted); font-weight: 600; }
  canvas { max-width: 100%; }
  #empty {
    background: var(--card);
    border-radius: 10px;
    padding: 40px;
    text-align: center;
    color: var(--muted);
    max-width: 600px;
  }
  #exerciseSelect {
    background: var(--card);
    color: var(--text);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    margin: 10px 0 24px;
  }

  @media (max-width: 600px) {
    #exerciseSelect { font-size: 16px; padding: 10px 14px; width: 100%; }
    body { padding: 18px 14px; }
    h1 { font-size: 30px; }
    #subtitle { font-size: 16px; margin-bottom: 20px; }
    #backLink { font-size: 16px; display: inline-block; margin-bottom: 10px; }
    #cards { grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 16px 0 28px; }
    .card { padding: 16px 14px; }
    .card .value { font-size: 30px; }
    .card .label { font-size: 14px; margin-top: 6px; }
    .charts { gap: 20px; }
    .chart-card { padding: 16px 14px; }
    .chart-card h2 { font-size: 17px; margin-bottom: 14px; }
    #empty { padding: 28px 20px; font-size: 17px; }
  }
</style>
</head>
<body>
  <a id="backLink" href="plank_posture_coach.html">&larr; Back to tracker</a>
  <h1>Posture Coach Dashboard</h1>
  <div id="subtitle">Pulled live from this browser's saved workout log.</div>
  <select id="exerciseSelect"></select>

  <div id="content"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
const LOG_KEY = "plankPostureLog";
const EXERCISE_LABELS = {
  plank: "Plank",
  pushup: "Push-up",
  sideplank: "Side Plank",
  glutebridge: "Glute Bridge",
  squat: "Squat",
  lunge: "Lunge"
};
const exerciseSelect = document.getElementById("exerciseSelect");

function exerciseLabel(id) {
  return EXERCISE_LABELS[id] || id;
}

function loadLog() {
  let log;
  try {
    log = JSON.parse(localStorage.getItem(LOG_KEY)) || {};
  } catch {
    log = {};
  }
  // Migrate old flat per-day format ({plankMs,...}) to the per-exercise nested format.
  for (const dateKey of Object.keys(log)) {
    if (typeof log[dateKey].plankMs === "number") {
      log[dateKey] = { plank: log[dateKey] };
    }
  }
  return log;
}

// Flattens the nested {date: {exerciseId: stats}} log into a filtered, per-day series.
// exerciseId === "__all__" sums every exercise together for that day.
function buildSeries(log, exerciseId) {
  const dateKeys = Object.keys(log).sort();
  const series = [];
  for (const dateKey of dateKeys) {
    const dayLog = log[dateKey];
    const ids = exerciseId === "__all__" ? Object.keys(dayLog) : Object.keys(dayLog).filter((id) => id === exerciseId);
    if (ids.length === 0) continue;
    const merged = { plankMs: 0, goodMs: 0, bestStreakMs: 0, sessions: 0 };
    for (const id of ids) {
      merged.plankMs += dayLog[id].plankMs;
      merged.goodMs += dayLog[id].goodMs;
      merged.bestStreakMs = Math.max(merged.bestStreakMs, dayLog[id].bestStreakMs);
      merged.sessions += dayLog[id].sessions;
    }
    series.push({ date: dateKey, ...merged });
  }
  return series;
}

function populateExerciseSelect(log) {
  const found = new Set();
  for (const dateKey of Object.keys(log)) {
    for (const id of Object.keys(log[dateKey])) found.add(id);
  }
  const ids = Array.from(found).sort((a, b) => exerciseLabel(a).localeCompare(exerciseLabel(b)));
  exerciseSelect.innerHTML =
    `<option value="__all__">All exercises</option>` + ids.map((id) => `<option value="${id}">${exerciseLabel(id)}</option>`).join("");
}

function fmtMinSec(ms) {
  const totalSec = Math.round(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${m}m ${s}s`;
}

function fmtDateLabel(key) {
  const [y, m, d] = key.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

function render() {
  const log = loadLog();
  const previousSelection = exerciseSelect.value || "__all__";
  populateExerciseSelect(log);
  exerciseSelect.value = previousSelection;
  if (exerciseSelect.value !== previousSelection) exerciseSelect.value = "__all__"; // selection no longer exists
  const selected = exerciseSelect.value;
  const series = buildSeries(log, selected);
  const content = document.getElementById("content");

  if (series.length === 0) {
    content.innerHTML = `<div id="empty">No sessions logged yet for this selection. Go do a workout, click "Stop &amp; Save" on the tracker page, then refresh this dashboard.</div>`;
    return;
  }

  let totalPlankMs = 0, totalGoodMs = 0, totalSessions = 0, bestStreakEver = 0;
  for (const e of series) {
    totalPlankMs += e.plankMs;
    totalGoodMs += e.goodMs;
    totalSessions += e.sessions;
    bestStreakEver = Math.max(bestStreakEver, e.bestStreakMs);
  }
  const avgPerfectPct = totalPlankMs > 0 ? Math.round((totalGoodMs / totalPlankMs) * 100) : 0;

  const timeLabel = selected === "__all__" ? "Total time" : `Total ${exerciseLabel(selected)} time`;

  content.innerHTML = `
    <div id="cards">
      <div class="card"><div class="value">${series.length}</div><div class="label">Days practiced</div></div>
      <div class="card"><div class="value">${fmtMinSec(totalPlankMs)}</div><div class="label">${timeLabel}</div></div>
      <div class="card"><div class="value">${fmtMinSec(totalGoodMs)}</div><div class="label">Total perfect-form time</div></div>
      <div class="card"><div class="value">${fmtMinSec(bestStreakEver)}</div><div class="label">Best streak ever</div></div>
      <div class="card"><div class="value">${avgPerfectPct}%</div><div class="label">Avg. form accuracy</div></div>
      <div class="card"><div class="value">${totalSessions}</div><div class="label">Total sessions</div></div>
    </div>
    <div class="charts">
      <div class="chart-card">
        <h2>Time held vs. perfect-form time per day</h2>
        <canvas id="timeChart" height="100"></canvas>
      </div>
      <div class="chart-card">
        <h2>Form accuracy trend (%)</h2>
        <canvas id="accuracyChart" height="80"></canvas>
      </div>
      <div class="chart-card">
        <h2>Best streak per day (seconds)</h2>
        <canvas id="streakChart" height="80"></canvas>
      </div>
    </div>
  `;

  const labels = series.map((e) => fmtDateLabel(e.date));
  const plankSec = series.map((e) => +(e.plankMs / 1000).toFixed(1));
  const goodSec = series.map((e) => +(e.goodMs / 1000).toFixed(1));
  const accuracyPct = series.map((e) => (e.plankMs > 0 ? Math.round((e.goodMs / e.plankMs) * 100) : 0));
  const streakSec = series.map((e) => +(e.bestStreakMs / 1000).toFixed(1));

  const gridColor = "rgba(255,255,255,0.06)";
  const tickColor = "#9aa0ab";

  new Chart(document.getElementById("timeChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [
        { label: "Total plank time (s)", data: plankSec, backgroundColor: "rgba(58,115,224,0.6)", borderRadius: 4 },
        { label: "Perfect-form time (s)", data: goodSec, backgroundColor: "rgba(95,217,138,0.8)", borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: tickColor } } },
      scales: {
        x: { ticks: { color: tickColor }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });

  new Chart(document.getElementById("accuracyChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Form accuracy %",
          data: accuracyPct,
          borderColor: "#5fd98a",
          backgroundColor: "rgba(95,217,138,0.15)",
          fill: true,
          tension: 0.3,
          pointRadius: 3
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: tickColor } } },
      scales: {
        x: { ticks: { color: tickColor }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor }, grid: { color: gridColor }, min: 0, max: 100 }
      }
    }
  });

  new Chart(document.getElementById("streakChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Best streak (s)",
          data: streakSec,
          borderColor: "#3a73e0",
          backgroundColor: "rgba(58,115,224,0.15)",
          fill: true,
          tension: 0.3,
          pointRadius: 3
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: tickColor } } },
      scales: {
        x: { ticks: { color: tickColor }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });
}

exerciseSelect.addEventListener("change", render);
render();
window.addEventListener("storage", render);
</script>
</body>
</html>
