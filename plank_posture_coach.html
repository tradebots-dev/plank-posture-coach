<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Plank Posture Coach</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 { font-size: 20px; margin: 8px 0 6px; }
  #exerciseTabs {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 720px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 10px;
  }
  #exerciseTabs button {
    margin-top: 0;
    flex: 0 0 auto;
    background: #1c1c1c;
    color: #ccc;
    border: 1px solid #333;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    white-space: nowrap;
  }
  #exerciseTabs button.active {
    background: #3a73e0;
    color: white;
    border-color: #3a73e0;
  }
  #stage {
    position: relative;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 4 / 3;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }
  video, canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 8px;
    pointer-events: none;
  }
  #stage.mirrored video, #stage.mirrored canvas {
    transform: scaleX(-1); /* mirror only when using a front/selfie camera */
  }
  #spacer { width: 100%; max-width: 720px; }
  #panel {
    width: 100%;
    max-width: 720px;
    margin-top: 12px;
    padding: 14px 16px;
    border-radius: 8px;
    background: #1c1c1c;
    transition: background 0.2s ease;
  }
  #status { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  #tip { font-size: 15px; opacity: 0.9; }
  #stats { font-size: 13px; opacity: 0.6; margin-top: 8px; white-space: pre-line; }
  .good { background: #173d24 !important; }
  .bad  { background: #3d1717 !important; }
  .neutral { background: #2a2a17 !important; }
  button {
    margin-top: 12px;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: #3a73e0;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { background: #444; cursor: not-allowed; }
  #controls { display: flex; gap: 10px; width: 100%; max-width: 720px; flex-wrap: wrap; align-items: center; }
  #controls a { text-decoration: none; }
  #audioToggleLabel { font-size: 13px; color: #eee; display: flex; align-items: center; gap: 6px; margin-left: 4px; }
  #logSection { width: 100%; max-width: 720px; margin-top: 24px; }
  #logSection h2 { font-size: 16px; margin-bottom: 8px; }
  #logTable { width: 100%; border-collapse: collapse; font-size: 13px; }
  #logTable th, #logTable td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #333; }
  #logTable th { opacity: 0.7; font-weight: 600; }

  @media (max-width: 600px) {
    h1 { font-size: 26px; }
    #exerciseTabs button { font-size: 15px; padding: 10px 16px; }
    #status { font-size: 24px; }
    #tip { font-size: 17px; }
    #stats { font-size: 15px; }
    button { font-size: 17px; padding: 12px 18px; }
    #audioToggleLabel { font-size: 16px; }
    #logSection h2 { font-size: 19px; }
    #logTable { font-size: 14px; }
  }

  /* Phone rotated to landscape: the camera view (sized by width before) would
     otherwise be tall enough to push the feedback panel off-screen. Constrain
     it by viewport height instead so both stay visible without scrolling. */
  @media (orientation: landscape) and (max-height: 500px) {
    body { padding: 6px 10px; }
    h1 { display: none; }
    #exerciseTabs { margin-bottom: 6px; }
    #exerciseTabs button { padding: 6px 10px; font-size: 12px; }
    #stage { width: auto; height: 42vh; max-width: 92vw; margin: 0 auto; }
    #spacer { display: none; }
    #panel { margin-top: 6px; padding: 8px 12px; }
    #status { font-size: 16px; margin-bottom: 2px; }
    #tip { font-size: 13px; }
    #stats { font-size: 11px; margin-top: 4px; }
    #controls { gap: 6px; }
    button { padding: 6px 10px; font-size: 12px; margin-top: 6px; }
    #audioToggleLabel { font-size: 12px; }
    #logSection { margin-top: 10px; }
    #logSection h2 { font-size: 14px; }
    #logTable { font-size: 11px; }
  }
</style>
</head>
<body>

  <div id="exerciseTabs"></div>

  </div>
  <div id="spacer"></div>
  <div id="panel" class="neutral">

    <div id="tip">Turn sideways to the camera so your shoulder, hip, and ankle are all visible.</div>
    <div id="stats"></div>
  </div>
  <div id="controls">
    <button id="startBtn">Start Camera</button>
    <button id="stopBtn" disabled>Stop &amp; Save</button>
    <button id="switchCameraBtn" disabled>Switch Camera</button>
    <button id="exportBtn">Export CSV</button>
    <a id="dashboardLink" href="dashboard.html" target="_blank"><button type="button">View Dashboard</button></a>
    <label id="audioToggleLabel"><input type="checkbox" id="audioToggle" checked> Audio cues</label>
  </div>
  <div id="logSection">
    <h2>Daily Log</h2>
    <table id="logTable">
      <thead><tr><th>Date</th><th>Exercise</th><th>Total Time</th><th>Perfect-Form Time</th><th>Best Streak</th><th>Sessions</th></tr></thead>
      <tbody><tr><td colspan="6">No sessions logged yet.</td></tr></tbody>
    </table>
  </div>

<script type="module">

const canvas = document.getElementById("overlay");

const statsEl = document.getElementById("stats");
const panelEl = document.getElementById("panel");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const switchCameraBtn = document.getElementById("switchCameraBtn");
const exportBtn = document.getElementById("exportBtn");
const audioToggle = document.getElementById("audioToggle");
const logTableBody = document.querySelector("#logTable tbody");
const tabsEl = document.getElementById("exerciseTabs");

// ---------------------------------------------------------------------------

let currentExerciseIndex = 0;

function renderTabs() {
  tabsEl.innerHTML = EXERCISES.map((ex, i) => `<button type="button" data-i="${i}" class="${i === currentExerciseIndex ? "active" : ""}">${ex.label}</button>`).join("");
  tabsEl.querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => switchExercise(Number(btn.dataset.i)));
  });
}

function applyExerciseUi() {
  const cfg = EXERCISES[currentExerciseIndex];
  if (stopBtn.disabled) {
    // Only overwrite the idle status text; if a session is running, leave the live readout alone.
    statusEl.textContent = poseLandmarker ? "Model ready. Click Start Camera." : "Loading pose model...";
    tipEl.textContent = cfg.notActiveTip;
    panelEl.className = "neutral";
  }
  renderTabs();
}

function switchExercise(index) {
  if (index === currentExerciseIndex) return;
  if (!stopBtn.disabled) stopSession();
  currentExerciseIndex = index;
  applyExerciseUi();
}

// ---------------------------------------------------------------------------
// Telegram notifications. Token/chat ID were configured once already and are
// just read from localStorage — there is no input UI for this anymore.
// ---------------------------------------------------------------------------
const TELEGRAM_TOKEN_KEY = "plankTelegramToken";
const TELEGRAM_CHATID_KEY = "plankTelegramChatId";
const DASHBOARD_URL = new URL("dashboard.html", location.href).toString();

async function sendTelegramMessage(text) {
  const token = localStorage.getItem(TELEGRAM_TOKEN_KEY);
  const chatId = localStorage.getItem(TELEGRAM_CHATID_KEY);
  if (!token || !chatId) return { ok: false, error: "Telegram token/chat ID not set." };
  try {
    const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        chat_id: chatId,
        text,
        parse_mode: "HTML",
        disable_web_page_preview: false
      })
    });
    const data = await res.json();
    return data.ok ? { ok: true } : { ok: false, error: data.description };
  } catch (err) {
    return { ok: false, error: err.message };
  }
}

const SPEAK_REPEAT_MS = 6000; // how often to repeat the same correction while it persists
const GOOD_ANNOUNCE_MS = 15000; // how often to announce perfect-form hold time
let lastSpokenKey = null;
let lastSpokenTime = 0;
let nextGoodAnnounceMs = GOOD_ANNOUNCE_MS;
let speechResumeIntervalId = null;

function speak(text) {
  if (!audioToggle.checked || !("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1;
  utter.pitch = 1;
  window.speechSynthesis.speak(utter);
}

function maybeSpeak(key, text, now) {
  const changed = key !== lastSpokenKey;
  const dueForRepeat = now - lastSpokenTime > SPEAK_REPEAT_MS;
  if (changed || dueForRepeat) {
    speak(text);
    lastSpokenKey = key;
    lastSpokenTime = now;
  }
}

const LOG_KEY = "plankPostureLog";

let poseLandmarker;
let goodStreakStart = null;
let bestStreakMs = 0;
let lastFrameTime = null;
let sessionPlankMs = 0;   // total time held in-position this session (good or bad form)
let sessionGoodMs = 0;    // total time held with correct ("good") form this session
let lastSavedPlankMs = 0; // portion of sessionPlankMs already flushed to the daily log
let lastSavedGoodMs = 0;  // portion of sessionGoodMs already flushed to the daily log
let flushIntervalId = null;

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function loadLog() {
  let log;
  try {
    log = JSON.parse(localStorage.getItem(LOG_KEY)) || {};
  } catch {
    log = {};
  }
  // Migrate old flat per-day format ({plankMs,...}) to the new per-exercise nested format
  // ({plank: {plankMs,...}}) so previously-saved plank sessions keep showing up.
  for (const dateKey of Object.keys(log)) {
    if (typeof log[dateKey].plankMs === "number") {
      log[dateKey] = { plank: log[dateKey] };
    }
  }
  return log;
}

function saveLog(log) {
  localStorage.setItem(LOG_KEY, JSON.stringify(log));
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function flushSessionToLog(sessionEnded) {
  const deltaPlank = Math.max(0, sessionPlankMs - lastSavedPlankMs);
  const deltaGood = Math.max(0, sessionGoodMs - lastSavedGoodMs);
  if (deltaPlank === 0 && deltaGood === 0 && !sessionEnded) return;
  const exerciseId = EXERCISES[currentExerciseIndex].id;
  const log = loadLog();
  const dateKey = todayKey();
  const dayLog = log[dateKey] || {};
  const entry = dayLog[exerciseId] || { plankMs: 0, goodMs: 0, bestStreakMs: 0, sessions: 0 };
  entry.plankMs += deltaPlank;
  entry.goodMs += deltaGood;
  entry.bestStreakMs = Math.max(entry.bestStreakMs, bestStreakMs);
  if (sessionEnded) entry.sessions += 1;
  dayLog[exerciseId] = entry;
  log[dateKey] = dayLog;
  saveLog(log);
  lastSavedPlankMs = sessionPlankMs;
  lastSavedGoodMs = sessionGoodMs;
  renderLog();
}

function exerciseLabel(id) {
  return EXERCISES.find((e) => e.id === id)?.label || id;
}

function renderLog() {
  const log = loadLog();
  const rows = [];
  for (const dateKey of Object.keys(log)) {
    for (const exId of Object.keys(log[dateKey])) {
      rows.push({ date: dateKey, exercise: exId, ...log[dateKey][exId] });
    }
  }
  rows.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
  const top = rows.slice(0, 20);
  logTableBody.innerHTML = top.length
    ? top
        .map(
          (r) =>
            `<tr><td>${r.date}</td><td>${exerciseLabel(r.exercise)}</td><td>${formatDuration(r.plankMs)}</td><td>${formatDuration(r.goodMs)}</td><td>${formatDuration(r.bestStreakMs)}</td><td>${r.sessions}</td></tr>`
        )
        .join("")
    : `<tr><td colspan="6">No sessions logged yet.</td></tr>`;
}

async function init() {
  const filesetResolver = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  poseLandmarker = await PoseLandmarker.createFromOptions(filesetResolver, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numPoses: 1
  });
  statusEl.textContent = "Model ready. Click Start Camera.";
}

const stageEl = document.getElementById("stage");
let currentFacingMode = "user"; // front camera by default; use the Switch Camera button to go to the back camera
let isMirrored = false;

async function acquireStream(facingMode) {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 1280, height: 720, facingMode: { ideal: facingMode } }
  });
  video.srcObject = stream;
  await video.play();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  stageEl.style.aspectRatio = `${video.videoWidth} / ${video.videoHeight}`;

  const track = stream.getVideoTracks()[0];
  const actualFacing = track.getSettings().facingMode;
  isMirrored = actualFacing === "user";
  stageEl.classList.toggle("mirrored", isMirrored);
}

switchCameraBtn.addEventListener("click", async () => {
  switchCameraBtn.disabled = true;
  const oldStream = video.srcObject;
  currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
  try {
    await acquireStream(currentFacingMode);
    if (oldStream) oldStream.getTracks().forEach((t) => t.stop());
  } catch (err) {
    console.error("Switch camera error:", err);
    tipEl.textContent = `Couldn't switch camera: ${err.message || err}`;
  }
  switchCameraBtn.disabled = false;
});

startBtn.addEventListener("click", async () => {
  // Must run synchronously inside the tap, before any await — iOS Safari only
  // "unlocks" speech synthesis if speak() is first called directly from a user gesture.
  if ("speechSynthesis" in window && audioToggle.checked) {
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
  }
  startBtn.disabled = true;
  statusEl.textContent = "Requesting camera access...";
  tipEl.textContent = "";
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error("getUserMedia is not available (camera API requires a secure context: http://localhost or https://).");
    }
    await acquireStream(currentFacingMode);

    goodStreakStart = null;
    bestStreakMs = 0;
    sessionPlankMs = 0;
    sessionGoodMs = 0;
    lastSavedPlankMs = 0;
    lastSavedGoodMs = 0;
    lastFrameTime = null;
    lastSpokenKey = null;
    lastSpokenTime = 0;
    nextGoodAnnounceMs = GOOD_ANNOUNCE_MS;
    stopBtn.disabled = false;
    switchCameraBtn.disabled = false;
    flushIntervalId = setInterval(() => flushSessionToLog(false), 2000);
    // iOS/WebKit has a long-standing bug where speechSynthesis silently pauses itself
    // after running a while; periodically resuming it works around that.
    speechResumeIntervalId = setInterval(() => {
      if ("speechSynthesis" in window) window.speechSynthesis.resume();
    }, 4000);

    requestAnimationFrame(loop);
  } catch (err) {
    console.error("Camera error:", err);
    statusEl.textContent = `Camera failed: ${err.name || "Error"}`;
    tipEl.textContent = err.message || String(err);
    startBtn.disabled = false;
    return;
  }
});

function stopSession() {
  if (flushIntervalId) {
    clearInterval(flushIntervalId);
    flushIntervalId = null;
  }
  if (speechResumeIntervalId) {
    clearInterval(speechResumeIntervalId);
    speechResumeIntervalId = null;
  }
  const cfg = EXERCISES[currentExerciseIndex];
  const thisSessionPlankMs = sessionPlankMs;
  const thisSessionGoodMs = sessionGoodMs;
  const thisSessionBestStreakMs = bestStreakMs;
  flushSessionToLog(true);
  const stream = video.srcObject;
  if (stream) stream.getTracks().forEach((track) => track.stop());
  video.srcObject = null;
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
  startBtn.disabled = false;
  stopBtn.disabled = true;
  switchCameraBtn.disabled = true;
  setPanel("neutral", "Session saved", "Click Start Camera to begin a new session.");
  statsEl.textContent = "";

  if (thisSessionPlankMs > 0) {
    const todayEntry = (loadLog()[todayKey()] || {})[cfg.id] || { plankMs: 0, goodMs: 0, sessions: 0 };
    const accuracy = thisSessionPlankMs > 0 ? Math.round((thisSessionGoodMs / thisSessionPlankMs) * 100) : 0;
    const message =
      `🏋️ <b>Fitness by PAI — ${cfg.label} session complete!</b>\n` +
      `This session: held ${formatDuration(thisSessionPlankMs)}, perfect form for ${formatDuration(thisSessionGoodMs)} (${accuracy}%), best streak ${formatDuration(thisSessionBestStreakMs)}.\n` +
      `Today's ${cfg.label} total: ${formatDuration(todayEntry.plankMs)} time, ${formatDuration(todayEntry.goodMs)} perfect form, ${todayEntry.sessions} session(s).\n` +
      `View your dashboard: ${DASHBOARD_URL}`;
    sendTelegramMessage(message).then((result) => {
      if (!result.ok && result.error) console.warn("Telegram send failed:", result.error);
    });
  }
}

stopBtn.addEventListener("click", stopSession);

window.addEventListener("beforeunload", () => flushSessionToLog(false));

exportBtn.addEventListener("click", () => {
  const log = loadLog();
  const rows = [];
  for (const dateKey of Object.keys(log).sort()) {
    for (const exId of Object.keys(log[dateKey])) {
      const e = log[dateKey][exId];
      rows.push({ date: dateKey, exercise: exId, ...e });
    }
  }
  const lines = ["date,exercise,total_seconds,perfect_form_seconds,best_streak_seconds,sessions"];
  for (const r of rows) {
    lines.push(`${r.date},${exerciseLabel(r.exercise)},${(r.plankMs / 1000).toFixed(1)},${(r.goodMs / 1000).toFixed(1)},${(r.bestStreakMs / 1000).toFixed(1)},${r.sessions}`);
  }
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "posture_coach_log.csv";
  a.click();
  URL.revokeObjectURL(url);
});

function angleAt(a, b, c) {
  // angle at vertex b, formed by points a-b-c, in degrees
  const v1 = { x: a.x - b.x, y: a.y - b.y };
  const v2 = { x: c.x - b.x, y: c.y - b.y };
  const dot = v1.x * v2.x + v1.y * v2.y;
  const mag1 = Math.hypot(v1.x, v1.y);
  const mag2 = Math.hypot(v2.x, v2.y);
  if (mag1 === 0 || mag2 === 0) return null;
  const cos = Math.min(1, Math.max(-1, dot / (mag1 * mag2)));
  return (Math.acos(cos) * 180) / Math.PI;
}

function pickSide(lm) {
  const leftVis = (lm[11]?.visibility ?? 0) + (lm[23]?.visibility ?? 0) + (lm[27]?.visibility ?? 0);
  const rightVis = (lm[12]?.visibility ?? 0) + (lm[24]?.visibility ?? 0) + (lm[28]?.visibility ?? 0);
  return leftVis >= rightVis
    ? { shoulder: lm[11], elbow: lm[13], wrist: lm[15], hip: lm[23], knee: lm[25], ankle: lm[27], ear: lm[7], visSum: leftVis }
    : { shoulder: lm[12], elbow: lm[14], wrist: lm[16], hip: lm[24], knee: lm[26], ankle: lm[28], ear: lm[8], visSum: rightVis };
}

function drawJointLabel(ctx, point, text, width, height) {
  if (!point) return;
  const x = point.x * width;
  const y = point.y * height;
  ctx.save();
  ctx.translate(x, y);
  if (isMirrored) ctx.scale(-1, 1); // pre-flip so the label reads correctly after the page's CSS mirror
  ctx.font = "bold 14px sans-serif";
  ctx.textAlign = "center";
  ctx.lineWidth = 3;
  ctx.strokeStyle = "rgba(0,0,0,0.85)";
  ctx.fillStyle = "#ffe066";
  ctx.strokeText(text, 0, -12);
  ctx.fillText(text, 0, -12);
  ctx.restore();
}

function setPanel(mode, status, tip) {
  panelEl.className = mode;
  statusEl.textContent = status;
  tipEl.textContent = tip;
}

// Evaluates the current exercise's rule against this frame's joints.
// Returns { active, mode, status, tip, speechKey, speechText, angleLabel, angleValue }.
function evaluateExercise(cfg, j) {
  if (cfg.type === "line") {
    const near = j[cfg.near], mid = j[cfg.mid], far = j[cfg.far];
    const dx = far.x - near.x, dy = far.y - near.y;
    const angleFromHorizontal = (Math.atan2(Math.abs(dy), Math.abs(dx)) * 180) / Math.PI;
    if (angleFromHorizontal > cfg.horizontalMax) {
      return { active: false, status: cfg.notActiveStatus, tip: cfg.notActiveTip };
    }
    const t = dx !== 0 ? (mid.x - near.x) / dx : 0.5;
    const expectedMidY = near.y + t * dy;
    const bodyLength = Math.hypot(dx, dy) || 1;
    const deviation = (mid.y - expectedMidY) / bodyLength;
    const lineAngle = angleAt(near, mid, far);
    if (Math.abs(deviation) <= cfg.slopeThreshold) {
      return { active: true, mode: "good", status: cfg.goodStatus, tip: cfg.goodMsg, angleLabel: "Line angle", angleValue: lineAngle };
    } else if (deviation > cfg.slopeThreshold) {
      return { active: true, mode: "bad", status: cfg.sagStatus, tip: cfg.sagMsg, speechKey: "sag", speechText: cfg.sagSpeech, angleLabel: "Line angle", angleValue: lineAngle };
    } else {
      return { active: true, mode: "bad", status: cfg.highStatus, tip: cfg.highMsg, speechKey: "high", speechText: cfg.highSpeech, angleLabel: "Line angle", angleValue: lineAngle };
    }
  }

  // "angle" type: squat / lunge / wall sit
  const { shoulder, hip, knee, ankle } = j;
  if (!knee) return { active: false, status: cfg.notActiveStatus, tip: cfg.notActiveTip };
  const kneeAngle = angleAt(hip, knee, ankle);
  if (kneeAngle === null || kneeAngle > cfg.standingThreshold) {
    return { active: false, status: cfg.notActiveStatus, tip: cfg.notActiveTip };
  }
  const torsoDx = shoulder.x - hip.x, torsoDy = shoulder.y - hip.y;
  const torsoAngleFromVertical = (Math.atan2(Math.abs(torsoDx), Math.abs(torsoDy)) * 180) / Math.PI;
  if (torsoAngleFromVertical > cfg.maxLean) {
    return { active: true, mode: "bad", status: cfg.leanStatus, tip: cfg.leanMsg, speechKey: "lean", speechText: cfg.leanSpeech, angleLabel: "Knee angle", angleValue: kneeAngle };
  }
  if (kneeAngle <= cfg.goodMax) {
    return { active: true, mode: "good", status: cfg.goodStatus, tip: cfg.goodMsg, angleLabel: "Knee angle", angleValue: kneeAngle };
  }
  return { active: true, mode: "bad", status: cfg.shallowStatus, tip: cfg.shallowMsg, speechKey: "shallow", speechText: cfg.shallowSpeech, angleLabel: "Knee angle", angleValue: kneeAngle };
}

function loop() {
  const now = performance.now();
  if (lastFrameTime === null) lastFrameTime = now;
  const deltaMs = now - lastFrameTime;
  lastFrameTime = now;
  const result = poseLandmarker.detectForVideo(video, now);
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!result.landmarks.length) {
    setPanel("neutral", "No person detected", "Step into frame, sideways to the camera, full body visible.");
    statsEl.textContent = "";
    goodStreakStart = null;
    ctx.restore();
    requestAnimationFrame(loop);
    return;
  }

  const lm = result.landmarks[0];
  const drawer = new DrawingUtils(ctx);
  drawer.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, { color: "#888", lineWidth: 2 });
  drawer.drawLandmarks(lm, { color: "#fff", radius: 3 });

  const joints = pickSide(lm);
  const { shoulder, elbow, wrist, hip, knee, ankle, ear, visSum } = joints;

  drawJointLabel(ctx, ear, "Ear", canvas.width, canvas.height);
  drawJointLabel(ctx, shoulder, "Shoulder", canvas.width, canvas.height);
  drawJointLabel(ctx, elbow, "Elbow", canvas.width, canvas.height);
  drawJointLabel(ctx, wrist, "Wrist", canvas.width, canvas.height);
  drawJointLabel(ctx, hip, "Hip", canvas.width, canvas.height);
  drawJointLabel(ctx, knee, "Knee", canvas.width, canvas.height);
  drawJointLabel(ctx, ankle, "Ankle", canvas.width, canvas.height);

  if (visSum < 1.2 || !shoulder || !hip || !ankle) {
    setPanel("neutral", "Can't see your side clearly", "Turn so your shoulder, hip, and ankle are all in frame.");
    statsEl.textContent = "";
    goodStreakStart = null;
    ctx.restore();
    requestAnimationFrame(loop);
    return;
  }

  const cfg = EXERCISES[currentExerciseIndex];
  const r = evaluateExercise(cfg, joints);

  if (!r.active) {
    setPanel("neutral", r.status, r.tip);
    statsEl.textContent = "";
    goodStreakStart = null;
    ctx.restore();
    requestAnimationFrame(loop);
    return;
  }

  sessionPlankMs += deltaMs;

  let neckNote = "";
  if (ear) {
    const neckAngle = angleAt(ear, shoulder, hip);
    if (neckAngle !== null && neckAngle < 150) {
      neckNote = " Also keep your neck in line with your spine.";
    }
  }
  const tip = r.tip + neckNote;

  if (r.mode === "good") {
    if (goodStreakStart === null) {
      goodStreakStart = now;
      nextGoodAnnounceMs = GOOD_ANNOUNCE_MS;
      if (lastSpokenKey && lastSpokenKey !== "good") speak("Good form, keep holding.");
    }
    sessionGoodMs += deltaMs;
    lastSpokenKey = "good";
    const goodElapsedMs = now - goodStreakStart;
    if (goodElapsedMs >= nextGoodAnnounceMs) {
      speak(`Perfect form for ${Math.round(nextGoodAnnounceMs / 1000)} seconds. Keep it up.`);
      nextGoodAnnounceMs += GOOD_ANNOUNCE_MS;
    }
  } else {
    goodStreakStart = null;
    maybeSpeak(r.speechKey, r.speechText, now);
  }

  if (goodStreakStart !== null) {
    const streakMs = now - goodStreakStart;
    bestStreakMs = Math.max(bestStreakMs, streakMs);
  }

  setPanel(r.mode, r.status, tip);
  const currentStreak = goodStreakStart ? ((now - goodStreakStart) / 1000).toFixed(1) : "0.0";
  statsEl.textContent =
    `${r.angleLabel}: ${r.angleValue ? r.angleValue.toFixed(0) : "--"}°  |  Current good-form streak: ${currentStreak}s  |  Best streak: ${(bestStreakMs / 1000).toFixed(1)}s\n` +
    `Total time held: ${formatDuration(sessionPlankMs)}  |  Total perfect-form time: ${formatDuration(sessionGoodMs)}`;

  ctx.restore();
  requestAnimationFrame(loop);
}

applyExerciseUi();
init();
renderLog();
</script>
